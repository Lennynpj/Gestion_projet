<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapportBoard — Suivi rédaction du rapport</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#21262d;--bord:#30363d;
  --acc:#f0a500;--red:#f85149;--blue:#58a6ff;--green:#56d364;--pur:#bc8cff;--ora:#e3b341;
  --tx:#c9d1d9;--mu:#8b949e;--txb:#f0f6fc;
  --ant:#f0a500;--len:#58a6ff;--sai:#56d364;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* NAV */
nav{background:var(--surf);border-bottom:1px solid var(--bord);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--txb);display:flex;align-items:center;gap:7px;}
.logo-i{width:26px;height:26px;background:var(--acc);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.tabs{display:flex;gap:2px;}
.tab{padding:4px 11px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--mu);transition:all .12s;white-space:nowrap;}
.tab:hover{color:var(--tx);background:var(--surf2);}
.tab.on{background:var(--acc);color:#000;font-family:'Syne',sans-serif;font-weight:700;}
.nav-r{display:flex;align-items:center;gap:6px;}
.mb{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid;transition:all .12s;user-select:none;}
.mb.off{opacity:.2;}
.mb-a{border-color:var(--ant);color:var(--ant);background:rgba(240,165,0,.07);}
.mb-l{border-color:var(--len);color:var(--len);background:rgba(88,166,255,.07);}
.mb-s{border-color:var(--sai);color:var(--sai);background:rgba(86,211,100,.07);}
.dot{width:7px;height:7px;border-radius:50%;}

/* PAGES */
/* BOARD */
#pgBoard{display:none;}
#pgBoard.on{display:block;height:calc(100vh - 50px);overflow-x:auto;overflow-y:hidden;padding:14px 16px;white-space:nowrap;}
#boardWrap{display:inline-flex;flex-direction:row;gap:12px;align-items:flex-start;height:100%;padding-bottom:14px;white-space:normal;}

/* SCROLL PAGES */
.pg{display:none;height:calc(100vh - 50px);overflow-y:auto;padding:18px 22px;scrollbar-width:thin;scrollbar-color:var(--bord) transparent;}
.pg.on{display:block;}

/* LIST */
.lst{background:var(--surf);border:1px solid var(--bord);border-radius:9px;width:260px;min-width:260px;display:flex;flex-direction:column;height:calc(100vh - 88px);flex-shrink:0;}
.lst-h{padding:9px 10px 7px;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--bord);flex-shrink:0;}
.lst-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.lst-ti{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;background:none;border:none;color:var(--txb);outline:none;flex:1;cursor:pointer;min-width:0;}
.lst-ti:focus{border-bottom:1px solid var(--acc);}
.lst-cnt{background:var(--surf2);color:var(--mu);font-size:10px;font-weight:600;padding:1px 5px;border-radius:7px;flex-shrink:0;}
.lmb{background:none;border:none;color:var(--mu);cursor:pointer;padding:2px 3px;border-radius:3px;font-size:13px;position:relative;flex-shrink:0;}
.lmb:hover{color:var(--tx);background:var(--surf2);}
.lst-cards{flex:1;overflow-y:auto;overflow-x:hidden;padding:7px 7px 3px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:var(--bord) transparent;min-height:0;}
.lst-foot{padding:5px 7px 7px;flex-shrink:0;}
.btn-ac{width:100%;background:none;border:1px dashed var(--bord);color:var(--mu);padding:5px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .12s;}
.btn-ac:hover{border-color:var(--acc);color:var(--acc);}
.btn-nl{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,.04);border:1px dashed var(--bord);color:var(--mu);padding:8px 14px;border-radius:9px;font-size:12px;cursor:pointer;min-width:190px;width:190px;height:46px;flex-shrink:0;vertical-align:top;transition:all .12s;}
.btn-nl:hover{border-color:var(--acc);color:var(--acc);}

/* CARD */
.card{background:var(--surf2);border:1px solid var(--bord);border-left:3px solid transparent;border-radius:6px;padding:8px 9px;cursor:grab;transition:all .12s;animation:ci .15s ease;}
@keyframes ci{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:translateY(0);}}
.card:hover{transform:translateY(-1px);box-shadow:0 3px 14px rgba(0,0,0,.4);border-color:#444c56;}
.card:active{cursor:grabbing;}
.card.dragging{opacity:.3;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:5px;}
.card-title{font-size:12px;line-height:1.4;flex:1;word-break:break-word;color:var(--txb);}
.card-desc{font-size:10px;color:var(--mu);margin-top:2px;line-height:1.35;}
.card-act{display:flex;gap:1px;opacity:0;transition:opacity .1s;flex-shrink:0;}
.card:hover .card-act{opacity:1;}
.cbtn{background:none;border:none;color:var(--mu);cursor:pointer;padding:1px 3px;border-radius:3px;font-size:11px;}
.cbtn:hover{color:var(--tx);background:var(--bord);}
.cbtn.del:hover{color:var(--red);}
.card-meta{display:flex;align-items:center;gap:3px;margin-top:6px;flex-wrap:wrap;}
.cm{font-size:9px;font-weight:500;padding:1px 6px;border-radius:7px;border:1px solid;}
.cm-antonin{color:var(--ant);border-color:rgba(240,165,0,.3);background:rgba(240,165,0,.07);}
.cm-lenny{color:var(--len);border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.07);}
.cm-said{color:var(--sai);border-color:rgba(86,211,100,.3);background:rgba(86,211,100,.07);}
.cl{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase;}
.cl-preparation{background:rgba(240,165,0,.14);color:var(--ant);}
.cl-coordination{background:rgba(88,166,255,.14);color:var(--len);}
.cl-controle{background:rgba(86,211,100,.14);color:var(--sai);}
.cl-securite{background:rgba(248,81,73,.14);color:var(--red);}
.cl-livraison{background:rgba(52,211,153,.14);color:#3ddbb5;}
.cl-pilotage{background:rgba(227,179,65,.14);color:var(--ora);}
.cl-risque{background:rgba(248,81,73,.14);color:var(--red);}
.cl-jalon{background:rgba(188,140,255,.14);color:var(--pur);}
.card-jalon{border-left-color:var(--pur)!important;}
.empty-s{color:var(--mu);font-size:11px;text-align:center;padding:14px 0;font-style:italic;}

/* SECTION TITLES */
.sec{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--txb);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.box{background:var(--surf);border:1px solid var(--bord);border-radius:9px;padding:16px;margin-bottom:16px;}
.box-ti{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--txb);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:6px;}

/* BUTTONS */
.btn-edit{background:none;border:1px solid var(--bord);color:var(--mu);padding:3px 9px;border-radius:5px;font-size:10px;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn-edit:hover{border-color:var(--acc);color:var(--acc);}
.btn-add-row{background:none;border:1px dashed var(--bord);color:var(--mu);padding:5px 12px;border-radius:5px;font-size:11px;cursor:pointer;transition:all .12s;margin-top:8px;}
.btn-add-row:hover{border-color:var(--green);color:var(--green);}
.btn-del-row{background:none;border:none;color:var(--mu);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px;}
.btn-del-row:hover{color:var(--red);}
.btn-save-row{background:var(--acc);color:#000;border:none;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:18px;}
.kpi-card{background:var(--surf);border:1px solid var(--bord);border-radius:9px;padding:14px;position:relative;overflow:hidden;cursor:pointer;transition:all .15s;}
.kpi-card:hover{border-color:#444c56;transform:translateY(-1px);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kav::before{background:var(--blue);}
.kpl::before{background:var(--acc);}
.kbu::before{background:var(--green);}
.kse::before{background:var(--red);}
.knc::before{background:var(--pur);}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);margin-bottom:6px;}
.kpi-val{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;line-height:1;margin-bottom:3px;}
.kpi-sub{font-size:10px;color:var(--mu);}
.kpi-bar-w{margin-top:9px;height:4px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.kpi-bar{height:100%;border-radius:2px;transition:width .5s ease;}
.kpi-al{font-size:9px;font-weight:700;margin-top:7px;padding:2px 7px;border-radius:4px;display:inline-block;}
.a-ok{background:rgba(86,211,100,.1);color:var(--green);}
.a-warn{background:rgba(240,165,0,.1);color:var(--acc);}
.a-bad{background:rgba(248,81,73,.1);color:var(--red);}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tbl th{background:var(--surf2);color:var(--mu);font-weight:600;padding:7px 10px;text-align:left;border-bottom:1px solid var(--bord);font-size:10px;text-transform:uppercase;letter-spacing:.4px;}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--bord);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}
.tbl input,.tbl select,.tbl textarea{background:var(--surf2);border:1px solid var(--bord);color:var(--tx);padding:3px 6px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:11px;outline:none;width:100%;}
.tbl input:focus,.tbl select:focus,.tbl textarea:focus{border-color:var(--acc);}

/* RACI */
.raci-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.raci-tbl th{background:var(--surf2);color:var(--mu);font-weight:600;padding:7px 10px;text-align:center;border:1px solid var(--bord);font-size:10px;text-transform:uppercase;}
.raci-tbl th:first-child{text-align:left;}
.raci-tbl td{padding:7px 10px;border:1px solid var(--bord);text-align:center;}
.raci-tbl td:first-child{text-align:left;font-weight:500;color:var(--txb);}
.raci-tbl tr:hover td{background:rgba(255,255,255,.015);}
.rR{background:rgba(240,165,0,.18);color:var(--acc);font-weight:700;border-radius:3px;padding:1px 6px;display:inline-block;cursor:pointer;}
.rA{background:rgba(88,166,255,.18);color:var(--blue);font-weight:700;border-radius:3px;padding:1px 6px;display:inline-block;cursor:pointer;}
.rC{background:rgba(86,211,100,.15);color:var(--green);font-weight:600;border-radius:3px;padding:1px 6px;display:inline-block;cursor:pointer;}
.rI{color:var(--mu);font-size:10px;cursor:pointer;}

/* GANTT */
.gantt-wrap{overflow-x:auto;}
.gbar-wrap{height:16px;background:var(--surf2);border-radius:3px;position:relative;overflow:hidden;}
.gbar{height:100%;border-radius:3px;position:absolute;display:flex;align-items:center;padding:0 5px;font-size:9px;font-weight:600;color:#000;}

/* WBS */
.wbs-c{display:flex;flex-direction:column;align-items:center;overflow-x:auto;padding:4px;}
.wbs-root{background:var(--acc);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;padding:9px 22px;border-radius:7px;}
.wbs-vl{width:2px;height:18px;background:var(--bord);}
.wbs-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;position:relative;padding-top:2px;}
.wbs-row::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:var(--bord);}
.wbs-lot{display:flex;flex-direction:column;align-items:center;}
.wbs-lot::before{content:'';width:2px;height:18px;background:var(--bord);}
.wbs-lot-box{border:1px solid;border-radius:7px;padding:6px 10px;font-size:10px;font-weight:700;text-align:center;min-width:88px;}
.wbs-subs{margin-top:5px;display:flex;flex-direction:column;gap:3px;}
.wbs-sub{background:var(--surf2);border:1px solid var(--bord);border-radius:4px;padding:3px 7px;font-size:9px;color:var(--mu);text-align:center;}

/* RISK */
.risk-mat{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;}
.rmc{border-radius:4px;height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:600;text-align:center;padding:2px;line-height:1.2;}
.rc-lo{background:rgba(86,211,100,.14);border:1px solid rgba(86,211,100,.2);color:var(--green);}
.rc-me{background:rgba(240,165,0,.14);border:1px solid rgba(240,165,0,.2);color:var(--acc);}
.rc-hi{background:rgba(248,81,73,.16);border:1px solid rgba(248,81,73,.25);color:var(--red);}
.crit-hi{color:var(--red);font-weight:700;}
.crit-me{color:var(--acc);font-weight:600;}
.crit-lo{color:var(--green);}
.freq-b{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;text-transform:uppercase;}
.fq-h{background:rgba(88,166,255,.14);color:var(--blue);}
.fq-m{background:rgba(86,211,100,.14);color:var(--green);}
.fq-t{background:rgba(240,165,0,.14);color:var(--acc);}
.fq-d{background:rgba(248,81,73,.1);color:var(--red);}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:800px){.charts-row{grid-template-columns:1fr;}}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:center;justify-content:center;animation:fi .1s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
.md{background:var(--surf);border:1px solid var(--bord);border-radius:11px;padding:22px;width:380px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 18px 55px rgba(0,0,0,.7);animation:su .14s ease;}
.md.wide{width:560px;}
@keyframes su{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.md h2{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--txb);margin-bottom:14px;}
.mf{margin-bottom:10px;}
.mf label{display:block;font-size:10px;font-weight:600;color:var(--mu);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;}
.mf input,.mf select,.mf textarea{width:100%;background:var(--surf2);border:1px solid var(--bord);color:var(--tx);padding:7px 9px;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color .12s;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--acc);}
.mf textarea{resize:vertical;min-height:55px;}
.mf select option{background:var(--surf2);}
.ma{display:flex;gap:7px;margin-top:16px;justify-content:flex-end;}
.bp{background:var(--acc);color:#000;border:none;padding:7px 15px;border-radius:5px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;}
.bp:hover{background:#ffb920;}
.bs{background:var(--surf2);color:var(--mu);border:1px solid var(--bord);padding:7px 12px;border-radius:5px;font-size:11px;cursor:pointer;}
.bs:hover{color:var(--tx);}
.br{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.3);padding:7px 12px;border-radius:5px;font-size:11px;cursor:pointer;}
.br:hover{background:rgba(248,81,73,.2);}

/* STATUS columns */
.lst-done .lst-ti{color:var(--green)!important;}
.lst-inprogress .lst-ti{color:var(--acc)!important;}
.card-done{opacity:.5;border-left-color:var(--green)!important;}
.card-done:hover{opacity:.75!important;}
.done-title{text-decoration:line-through;color:var(--mu);}
.cbtn-done{background:none;border:none;cursor:pointer;font-size:14px;padding:0 4px 0 0;flex-shrink:0;transition:transform .12s;line-height:1;}
.cbtn-done:hover{transform:scale(1.2);}
.cbtn-done.is-done{opacity:.7;}
.btn-reset{background:none;border:1px solid rgba(248,81,73,.4);color:var(--red);padding:3px 9px;border-radius:5px;font-size:10px;cursor:pointer;transition:all .12s;}
.btn-reset:hover{background:rgba(248,81,73,.1);}

/* DROPDOWN */
.ddm{position:absolute;top:calc(100%+2px);right:0;background:var(--surf);border:1px solid var(--bord);border-radius:6px;padding:3px;z-index:200;min-width:140px;box-shadow:0 4px 18px rgba(0,0,0,.5);}
.ddi{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--tx);border:none;background:none;width:100%;text-align:left;}
.ddi:hover{background:var(--surf2);}
.ddi.danger{color:var(--red);}
.ddi.danger:hover{background:rgba(248,81,73,.08);}

/* TOAST */
.tc{position:fixed;bottom:16px;right:16px;z-index:600;display:flex;flex-direction:column;gap:5px;}
.toast{background:var(--surf);border:1px solid var(--bord);border-left:3px solid var(--acc);padding:8px 12px;border-radius:5px;font-size:11px;box-shadow:0 3px 16px rgba(0,0,0,.5);animation:tin .2s ease;color:var(--txb);}
@keyframes tin{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bord);border-radius:6px;}
</style>
</head>
<body>
<nav>
  <div class="logo"><div class="logo-i">📝</div>RapportBoard</div>
  <div class="tabs">
    <button class="tab on"  onclick="showPg('Board',this)">📋 Tâches</button>
  </div>
  <div class="nav-r">
    <div class="mb mb-a" data-m="Antonin" onclick="toggleF('Antonin')"><div class="dot" style="background:var(--ant)"></div>Antonin</div>
    <div class="mb mb-l" data-m="Lenny"   onclick="toggleF('Lenny')">  <div class="dot" style="background:var(--len)"></div>Lenny</div>
    <div class="mb mb-s" data-m="Said"    onclick="toggleF('Said')">   <div class="dot" style="background:var(--sai)"></div>Said</div>
    <button class="btn-reset" onclick="resetData()" title="Remettre les données par défaut">↺ Reset</button>
  </div>
</nav>

<!-- BOARD -->
<div id="pgBoard" class="on">
  <div id="boardWrap"></div>
</div>


<!-- MODALS -->
<div class="mo" id="moCard" style="display:none" onclick="closeMoOv(event,'moCard')">
  <div class="md">
    <h2 id="moCardTi">➕ Nouvelle carte</h2>
    <div class="mf"><label>Titre *</label><input id="cTitle"/></div>
    <div class="mf"><label>Description</label><textarea id="cDesc"></textarea></div>
    <div class="mf"><label>Responsable</label><select id="cMember"><option value="">— Aucun —</option><option>Antonin</option><option>Lenny</option><option>Said</option></select></div>
    <div class="mf"><label>Label</label><select id="cLabel"><option value="">— Aucun —</option><option value="preparation">Planification</option><option value="coordination">Schémas</option><option value="controle">Relecture</option><option value="livraison">Livrable</option><option value="pilotage">Rédaction</option><option value="jalon">Jalon ⭐</option></select></div>
    <div class="ma"><button class="bs" onclick="closeMo('moCard')">Annuler</button><button class="bp" onclick="saveCard()">Enregistrer</button></div>
  </div>
</div>
<div class="mo" id="moList" style="display:none" onclick="closeMoOv(event,'moList')">
  <div class="md"><h2>📁 Nouvelle liste</h2>
    <div class="mf"><label>Nom *</label><input id="lName"/></div>
    <div class="ma"><button class="bs" onclick="closeMo('moList')">Annuler</button><button class="bp" onclick="saveList()">Créer</button></div>
  </div>
</div>
<div class="tc" id="toastC"></div>

<script>
const SK='rapport_v1';
const D={
  lists:[
    {id:'l1',title:'📋 À faire',color:'#8b949e'},
    {id:'l2',title:'⚙️ En cours',color:'#f0a500'},
    {id:'l3',title:'✅ Terminé',color:'#56d364'},
  ],

function load(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(D));}
function save(){try{localStorage.setItem(SK,JSON.stringify(st));}catch(e){}}
function gid(){return 'i'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let st=load(), filters=['Antonin','Lenny','Said'], editCardId=null, editListId=null, dragId=null;

// ── NAV ──
function showPg(p,el){
  document.querySelectorAll('[id^="pg"]').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.getElementById('pg'+p).classList.add('on');
  el.classList.add('on');
}

// ── FILTER ──
function toggleF(m){
  if(filters.includes(m)){if(filters.length===1)return;filters=filters.filter(x=>x!==m);}
  else filters.push(m);
  document.querySelectorAll('.mb').forEach(b=>b.classList.toggle('off',!filters.includes(b.dataset.m)));
  renderBoard();
}

// ══════════════════════════════════════════
// BOARD
// ══════════════════════════════════════════
function renderBoard(){
  const w=document.getElementById('boardWrap'); w.innerHTML='';
  st.lists.forEach(list=>{
    const isDone=list.title.includes('✅')||list.title.toLowerCase().includes('terminé');
    const isInProgress=list.title.includes('⚙️')||list.title.toLowerCase().includes('en cours');
    const statusCls=isDone?'lst-done':isInProgress?'lst-inprogress':'lst-todo';
    const cards=st.cards.filter(c=>c.listId===list.id&&(!c.member||filters.includes(c.member)));
    const doneCount=cards.filter(c=>c.done).length;
    const el=document.createElement('div'); el.className=`lst ${statusCls}`;
    el.innerHTML=`
      <div class="lst-h">
        <div class="lst-dot" style="background:${list.color}"></div>
        <input class="lst-ti" value="${esc(list.title)}"
          onblur="renameList('${list.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"/>
        <span class="lst-cnt">${isDone?doneCount:cards.length-doneCount+'/'+cards.length}</span>
        <div style="position:relative">
          <button class="lmb" onclick="toggleDd(event,'dd_${list.id}')">⋯</button>
          <div class="ddm" id="dd_${list.id}" style="display:none">
            <button class="ddi" onclick="openAddCard('${list.id}')">➕ Ajouter</button>
            <button class="ddi danger" onclick="delList('${list.id}')">🗑️ Supprimer</button>
          </div>
        </div>
      </div>
      <div class="lst-cards" id="lc_${list.id}"
        ondragover="onDOver(event)" ondrop="onDrop(event,'${list.id}')">
        ${cards.length===0?'<div class="empty-s">Aucune carte</div>':cards.map(c=>renderCard(c,isDone)).join('')}
      </div>
      <div class="lst-foot"><button class="btn-ac" onclick="openAddCard('${list.id}')">＋ Ajouter une carte</button></div>`;
    w.appendChild(el);
  });
  const btn=document.createElement('button'); btn.className='btn-nl'; btn.textContent='＋ Nouvelle liste'; btn.onclick=openAddList; w.appendChild(btn);
}
function renderCard(c, forceStyle){
  const mc=c.member?`cm-${c.member.toLowerCase()}`:''; const lc=c.label?`cl-${c.label}`:'';
  const isDone=c.done===true;
  const cardCls=`card${c.label==='jalon'?' card-jalon':''}${isDone?' card-done':''}`;
  return`<div class="${cardCls}" id="card_${c.id}" draggable="true" ondragstart="onDS(event,'${c.id}')" ondragend="onDE()">
    <div class="card-top">
      <button class="cbtn-done ${isDone?'is-done':''}" onclick="toggleDone('${c.id}')" title="${isDone?'Rouvrir':'Marquer comme terminé'}">${isDone?'✅':'⬜'}</button>
      <div class="card-title ${isDone?'done-title':''}">${esc(c.title)}${c.desc&&!isDone?`<div class="card-desc">${esc(c.desc)}</div>`:''}</div>
      <div class="card-act">
        <button class="cbtn" onclick="openEditCard('${c.id}')">✏️</button>
        <button class="cbtn del" onclick="delCard('${c.id}')">✕</button>
      </div>
    </div>
    ${!isDone?`<div class="card-meta">
      ${c.label?`<span class="cl ${lc}">${c.label}</span>`:''}
      ${c.member?`<span class="cm ${mc}">${c.member}</span>`:''}
    </div>`:''}
  </div>`;
}
function toggleDone(id){
  const c=st.cards.find(x=>x.id===id); if(!c)return;
  c.done=!c.done;
  // Move to Terminé list if done, else move back to En cours
  if(c.done){
    const doneList=st.lists.find(l=>l.title.includes('✅')||l.title.toLowerCase().includes('terminé'));
    if(doneList) c.listId=doneList.id;
  } else {
    const inProgressList=st.lists.find(l=>l.title.includes('⚙️')||l.title.toLowerCase().includes('en cours'));
    if(inProgressList) c.listId=inProgressList.id;
  }
  save(); renderBoard();
  toast(c.done?'✅ Tâche terminée !':'↩️ Tâche réouverte');
}
function onDS(e,id){dragId=id;setTimeout(()=>{const el=document.getElementById('card_'+id);if(el)el.classList.add('dragging');},0);}
function onDE(){document.querySelectorAll('.card').forEach(c=>c.classList.remove('dragging'));dragId=null;}
function onDOver(e){e.preventDefault();}
function onDrop(e,listId){e.preventDefault();if(!dragId)return;const c=st.cards.find(x=>x.id===dragId);if(c){c.listId=listId;save();renderBoard();toast('Déplacée ✓');}dragId=null;}
function openAddList(){document.getElementById('lName').value='';document.getElementById('moList').style.display='flex';setTimeout(()=>document.getElementById('lName').focus(),80);}
function saveList(){const n=document.getElementById('lName').value.trim();if(!n)return;const cs=['#f0a500','#58a6ff','#56d364','#bc8cff','#f85149','#e3b341'];st.lists.push({id:gid(),title:n,color:cs[st.lists.length%cs.length]});save();renderBoard();closeMo('moList');toast('Liste créée ✓');}
function delList(id){if(!confirm('Supprimer cette liste et ses cartes ?'))return;st.lists=st.lists.filter(l=>l.id!==id);st.cards=st.cards.filter(c=>c.listId!==id);save();renderBoard();toast('Supprimée');closeAllDd();}
function renameList(id,v){const l=st.lists.find(x=>x.id===id);if(l&&v.trim()){l.title=v.trim();save();renderBoard();}}
function openAddCard(listId){editCardId=null;editListId=listId;document.getElementById('moCardTi').textContent='➕ Nouvelle carte';['cTitle','cDesc'].forEach(i=>document.getElementById(i).value='');['cMember','cLabel'].forEach(i=>document.getElementById(i).value='');document.getElementById('moCard').style.display='flex';closeAllDd();setTimeout(()=>document.getElementById('cTitle').focus(),80);}
function openEditCard(id){const c=st.cards.find(x=>x.id===id);if(!c)return;editCardId=id;editListId=null;document.getElementById('moCardTi').textContent='✏️ Modifier';document.getElementById('cTitle').value=c.title;document.getElementById('cDesc').value=c.desc||'';document.getElementById('cMember').value=c.member||'';document.getElementById('cLabel').value=c.label||'';document.getElementById('moCard').style.display='flex';setTimeout(()=>document.getElementById('cTitle').focus(),80);}
function saveCard(){const t=document.getElementById('cTitle').value.trim();if(!t)return;const m=document.getElementById('cMember').value,l=document.getElementById('cLabel').value,d=document.getElementById('cDesc').value.trim();if(editCardId){const c=st.cards.find(x=>x.id===editCardId);if(c){c.title=t;c.member=m;c.label=l;c.desc=d;}toast('Mise à jour ✓');}else{st.cards.push({id:gid(),listId:editListId,title:t,member:m,label:l,desc:d});toast('Ajoutée ✓');}save();renderBoard();closeMo('moCard');}
function delCard(id){if(!confirm('Supprimer ?'))return;st.cards=st.cards.filter(c=>c.id!==id);save();renderBoard();toast('Supprimée');}


// ── MODAL HELPERS ──
// ── MODAL HELPERS ──
function closeMo(id){document.getElementById(id).style.display='none';}
function closeMoOv(e,id){if(e.target===document.getElementById(id))closeMo(id);}
function toggleDd(e,id){e.stopPropagation();const m=document.getElementById(id);const v=m.style.display==='block';closeAllDd();if(!v)m.style.display='block';}
function closeAllDd(){document.querySelectorAll('.ddm').forEach(m=>m.style.display='none');}
document.addEventListener('click',closeAllDd);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.mo').forEach(m=>m.style.display='none');closeAllDd();}});

function toast(msg){const c=document.getElementById('toastC');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),2500);}

function resetData(){if(!confirm('Remettre toutes les données par défaut ? Toutes les modifications seront perdues.'))return;localStorage.removeItem(SK);st=JSON.parse(JSON.stringify(D));renderBoard();toast('Données réinitialisées ✓');}

// ── INIT ──
renderBoard();
</script>
